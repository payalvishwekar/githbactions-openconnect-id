name: nodejs app to eks 
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: my-node-app
  EKS_CLUSTER_NAME: my-eks-cluster
  IMAGE_TAG: ${{github.sha}}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/Checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/Configure-aws-credentials@a4
        with: 
          role-to-assume: arn:aws:iam::287466334815:role/GitHubActionsEKSRole
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions
      - name: login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
      - name: update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
      - name: deploy to EKS
        run: |
          sed -i "s|IMAGE_TAG|${{ env.IMAGE_TAG }}|g" k8s/deployment.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
          echo "deployment completed successfully"
